<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서울미래아이 콘텐츠 지도</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="title-area">
          <p class="eyebrow">서울미래아이 365</p>
          <h1>서울 어린이 박물관·체험 지도</h1>
          <p class="intro">PDF 수록 콘텐츠를 지도와 목록으로 탐색하고, 공식 정보 보강 상태를 함께 확인합니다.</p>
        </div>
        <div class="stats">
          <div>
            <strong id="total-count">0</strong>
            <span>지도 후보</span>
          </div>
          <div>
            <strong id="verified-count">0</strong>
            <span>좌표 확인</span>
          </div>
          <div>
            <strong id="image-count">0</strong>
            <span>대표 이미지</span>
          </div>
        </div>
      </header>

      <section class="filters" aria-label="검색과 필터">
        <label class="field search-field">
          <span>검색</span>
          <input id="search-input" type="search" placeholder="시설명, 키워드, 주소 검색" />
        </label>
        <label class="field">
          <span>주제</span>
          <select id="theme-filter">
            <option value="">전체 주제</option>
          </select>
        </label>
        <label class="field">
          <span>지역</span>
          <select id="district-filter">
            <option value="">전체 지역</option>
          </select>
        </label>
        <label class="field">
          <span>연령</span>
          <select id="age-filter">
            <option value="">전체 연령</option>
            <option value="유아">유아</option>
            <option value="초등">초등</option>
          </select>
        </label>
        <label class="field">
          <span>요금</span>
          <select id="fee-filter">
            <option value="">전체 요금</option>
          </select>
        </label>
        <button id="reset-filters" class="reset-button" type="button">초기화</button>
      </section>

      <div class="result-strip">
        <p id="result-count">0개 표시 중</p>
        <p id="active-summary">필터 없음</p>
      </div>

      <div class="mobile-tabs" role="tablist" aria-label="모바일 보기">
        <button id="show-map" class="is-active" type="button" role="tab" aria-selected="true">지도</button>
        <button id="show-list" type="button" role="tab" aria-selected="false">목록</button>
      </div>

      <main class="workspace" data-mobile-view="map">
        <section class="map-section" aria-label="지도">
          <div id="map"></div>
        </section>
        <aside class="list-section" aria-label="시설 목록">
          <div id="card-list" class="card-list"></div>
        </aside>
      </main>
    </div>

    <template id="card-template">
      <article class="museum-card" tabindex="0">
        <div class="image-box">
          <img class="thumb" alt="" loading="lazy" />
          <div class="image-fallback">
            <span class="fallback-theme"></span>
          </div>
        </div>
        <div class="card-body">
          <div class="chip-row">
            <span class="theme-chip"></span>
            <span class="district-chip"></span>
            <span class="status-chip"></span>
          </div>
          <h2 class="name"></h2>
          <p class="keyword"></p>
          <dl class="meta">
            <div>
              <dt>권장연령</dt>
              <dd class="age"></dd>
            </div>
            <div>
              <dt>이용요금</dt>
              <dd class="fee"></dd>
            </div>
            <div>
              <dt>운영요일</dt>
              <dd class="days"></dd>
            </div>
            <div>
              <dt>주소</dt>
              <dd class="address"></dd>
            </div>
          </dl>
          <p class="notes"></p>
          <div class="actions">
            <button class="map-button" type="button">지도에서 보기</button>
            <a class="site-button" target="_blank" rel="noreferrer noopener">공식 페이지</a>
          </div>
        </div>
      </article>
    </template>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
